<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Main Form</h1>
      <form id="todo-form" novalidate>
        <label>
          Description
          <input id="description" name="description" type="text" required />
          <small id="description-error" class="field-error" role="alert" aria-live="polite"></small>
        </label>

        <label>
          Tags (comma separated)
          <input id="tags" name="tags" type="text" placeholder="work, urgent" required />
          <small id="tags-error" class="field-error" role="alert" aria-live="polite"></small>
        </label>

        <label>
          Schedule A
          <input
            id="scheduleA"
            name="scheduleA"
            type="datetime-local"
            required
          />
          <small id="scheduleA-error" class="field-error" role="alert" aria-live="polite"></small>
        </label>

        <label>
          Schedule B
          <input id="scheduleB" name="scheduleB" type="datetime-local" required />
          <small id="scheduleB-error" class="field-error" role="alert" aria-live="polite"></small>
        </label>

        <p id="form-error" role="alert" aria-live="polite"></p>
        <button type="submit">Save</button>
      </form>

      <section>
        <h2>Submitted items</h2>
        <ul id="items"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
