<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Keeping Software</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Time Keeping Software</h1>
        <p id="clock" aria-live="polite">--:--:--</p>
      </header>

      <section class="panel">
        <h2>Current Session</h2>
        <div class="session-grid">
          <div>
            <p class="label">Status</p>
            <p id="session-status">Not clocked in</p>
          </div>
          <div>
            <p class="label">Clock in time</p>
            <p id="clock-in-time">—</p>
          </div>
          <div>
            <p class="label">Elapsed</p>
            <p id="elapsed-time">00:00:00</p>
          </div>
        </div>

        <form id="session-form" novalidate>
          <label for="project">Project</label>
          <input id="project" name="project" type="text" placeholder="Client website redesign" required />

          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="3" placeholder="What are you working on?"></textarea>

          <p id="form-error" role="alert" aria-live="polite"></p>
          <div class="actions">
            <button type="button" id="clock-in">Clock In</button>
            <button type="button" id="clock-out">Clock Out</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <div class="summary-grid">
          <div>
            <p class="label">Today</p>
            <p id="today-total">0h 0m</p>
          </div>
          <div>
            <p class="label">This week</p>
            <p id="week-total">0h 0m</p>
          </div>
          <div>
            <p class="label">Total entries</p>
            <p id="entry-count">0</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Time Log</h2>
        <ul id="entries" class="entries"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
